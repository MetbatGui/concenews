# GitHub Labels Configuration

labels:
  - name: epic
    color: 9C27B0
    description: "Epic (Slice definition)"

  - name: "type:feat"
    color: 2196F3
    description: "New feature"

  - name: "type:fix"
    color: F44336
    description: "Bug fix"

  - name: "type:docs"
    color: FFC107
    description: "Documentation"

  - name: "type:refactor"
    color: 4CAF50
    description: "Code refactor"

  - name: "type:chore"
    color: 9E9E9E
    description: "Chore (build, deps, etc)"

  - name: "status:planning"
    color: E1BEE7
    description: "Planning stage"

  - name: "status:in-progress"
    color: BBDEFB
    description: "In progress"

  - name: "status:done"
    color: C8E6C9
    description: "Completed"
