services:
  postgres-test:
    image: postgres:17-alpine
    container_name: concenews-postgres-test
    environment:
      POSTGRES_USER: concenews
      POSTGRES_PASSWORD: concenews
      POSTGRES_DB: concenews_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concenews"]
      interval: 5s
      timeout: 5s
      retries: 5
