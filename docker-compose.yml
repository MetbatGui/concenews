services:
  postgres:
    image: postgres:17-alpine
    container_name: concenews-postgres
    environment:
      POSTGRES_USER: concenews
      POSTGRES_PASSWORD: concenews
      POSTGRES_DB: concenews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concenews"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
